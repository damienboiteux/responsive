<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Site à vocation pédagogique pour illustrer le Responsive Web Design : design fixe">
    <title>Layout fixe</title>
    <style>
        body {
            margin: 0;
            color: #fff;
        }

        .container {
            width: 960px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header, footer {
            height: 100px;
            background-color: #3498db;
            text-align: center;
            line-height: 100px;
        }
        
        main {
            flex-grow: 1;
            display: flex;
        }
        .sidebar {
            /* width: 200px; */
            flex-grow: 1;
            flex-basis: 20%;
            height: 300px;
            background-color: #2ecc71;
            text-align: center;
            line-height: 300px;
        }
        .content {
            /* width: 560px; */
            flex-basis: 60%;
            height: 300px;
            /* min-height: calc(100vh - 200px); */
            background-color: #a81cb4;
            text-align: center;
            line-height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>HEADER</header>
        <main>
            <div class="sidebar">GAUCHE</div>
            <div class="content">
                LAYOUT FIXE
            </div>
            <div class="sidebar">DROITE</div>
        </main>
        <footer>FOOTER</footer>
    </div>
</body>
</html>
