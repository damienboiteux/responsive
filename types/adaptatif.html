<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Site à vocation pédagogique pour illustrer le Responsive Web Design : design fixe">
    <title>Layout adaptatif</title>
    <style>
        body {
            margin: 0;
            color: #fff;

        }
        header, footer {
            height: 100px;
            background-color: #3498db;
            text-align: center;
            line-height: 100px;
        }
        .pub {
            height: 50px;
            background-color: #e74c3c;
            text-align: center;
            line-height: 50px;
        }
        main {
            display: flex;
        }
        .sidebar {
            width: 200px;
            height: 300px;
            background-color: #2ecc71;
            text-align: center;
            line-height: 300px;
        }
        .content {
            width: 568px;
            height: 300px;
            background-color: #a81cb4;
            text-align: center;
            line-height: 300px;
        }
        .container {
            width: 960px;
            margin: 0 auto;
        }

        /* Version tablette */
        @media (max-width: 768px) {
            .container {
                width: 700px;
            }
            .sidebar {
                width: 150px;
            }
            .content {
                width: 400px;
            }
        }

        /* Version mobile */
        @media (max-width: 480px) {
            main {
                display:block;
            }
            .sidebar, .content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>HEADER</header>
        <div class="pub">PUBLICITÉ</div>
        <main>
            <div class="sidebar">GAUCHE</div>
            <div class="content">
                LAYOUT ADAPTATIF
            </div>
            <div class="sidebar">DROITE</div>
        </main>
        <footer>FOOTER</footer>
    </div>
</body>
</html>
